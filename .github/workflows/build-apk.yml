name: Сборка Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # нужно для публикации релиза

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      # Переименовываем APK в понятное имя
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Mebel-ProDesign.apk

      # Публикуем релиз с тегом "latest" — перезаписывается при каждом пуше
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Последняя версия
          body: Актуальная версия приложения ПроДизайн для Android.
          prerelease: false
          make_latest: true
          files: Mebel-ProDesign.apk
