name: Сборка Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Mebel-ProDesign.apk

      # Удаляем старый релиз если есть, потом создаём новый
      - name: Delete old release if exists
        run: |
          gh release delete apk --yes 2>/dev/null || true
          git push origin :refs/tags/apk 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk
          name: Последняя версия APK
          body: Актуальная версия приложения «Считаем мебель ПроДизайн» для Android.
          make_latest: true
          files: Mebel-ProDesign.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
