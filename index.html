<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <!-- Иконки -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png">

    <!-- PWA манифест -->
    <link rel="manifest" href="/manifest.json">

    <!-- Мобильная версия -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- iOS: выглядит как нативное приложение (без браузерной строки) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ПроДизайн">

    <!-- Android / общее -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1565C0">
    <meta name="description" content="Расчёт стоимости мебели и формирование КП">

    <title>ПроДизайн Калькулятор</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Регистрация сервис-воркера для офлайн-режима -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
